services:
  qdrant:
    image: qdrant/qdrant:v1.13.3
    container_name: book-rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  indexer:
    profiles: ["init"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: book-rag-indexer
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
    volumes:
      - hf_cache:/app/.cache/huggingface
    depends_on:
      - qdrant
    command: ["python", "scripts/index_to_qdrant.py"]
    restart: "no"

volumes:
  qdrant_data:
  hf_cache:
